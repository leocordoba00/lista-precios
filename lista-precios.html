<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Precios</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --border-hover: #444;
    --text: #e8e8e8;
    --text-muted: #666;
    --text-dim: #999;
    --accent: #c8f135;
    --accent-dim: rgba(200, 241, 53, 0.12);
    --accent-dim2: rgba(200, 241, 53, 0.06);
    --blue: #5b9cf6;
    --blue-dim: rgba(91, 156, 246, 0.08);
    --purple: #b07ef8;
    --purple-dim: rgba(176, 126, 248, 0.08);
    --red: #ff4444;
    --red-dim: rgba(255, 68, 68, 0.12);
    --green: #3ddc84;
    --radius: 6px;
    --radius-sm: 4px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding: 32px 24px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 32px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  #status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    min-height: 24px;
  }

  #status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.3s;
    flex-shrink: 0;
  }
  #status-dot.ok { background: var(--green); }
  #status-dot.error { background: var(--red); }
  #status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  #status-text {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover {
    border-color: var(--border-hover);
    color: var(--text);
    background: var(--surface2);
  }

  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f0f0f;
    font-weight: 600;
  }

  .btn.primary:hover {
    background: #d4f54a;
    border-color: #d4f54a;
  }

  .table-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 1100px;
  }

  thead th {
    background: var(--surface2);
    padding: 10px 12px;
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  thead th.blue-header {
    background: var(--blue-dim);
    color: var(--blue);
    border-left: 1px solid var(--border);
  }

  thead th.purple-header {
    background: var(--purple-dim);
    color: var(--purple);
    border-left: 1px solid var(--border);
  }

  thead th.accent-header {
    background: var(--accent-dim2);
    color: var(--accent);
    border-left: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  td {
    padding: 6px 8px;
    vertical-align: middle;
  }

  td.blue-group {
    background: var(--blue-dim);
    border-left: 1px solid var(--border);
  }

  td.purple-group {
    background: var(--purple-dim);
    border-left: 1px solid var(--border);
  }

  td.accent-group {
    background: var(--accent-dim2);
    border-left: 1px solid var(--border);
  }

  .cell-input {
    width: 100%;
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 5px 8px;
    transition: all 0.15s;
    outline: none;
  }

  .cell-input:hover {
    border-color: var(--border);
    background: var(--surface);
  }

  .cell-input:focus {
    border-color: var(--border-hover);
    background: var(--surface2);
  }

  .cell-input.producto-input {
    font-family: 'Inter', sans-serif;
    min-width: 160px;
  }

  .cell-input.num-input {
    min-width: 70px;
    text-align: right;
  }

  .pct-input {
    width: 52px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    padding: 5px 6px;
    text-align: center;
    outline: none;
    transition: all 0.15s;
  }

  .pct-input:focus {
    border-color: var(--border-hover);
  }

  .pct-input.blue:focus { border-color: var(--blue); color: var(--blue); }
  .pct-input.purple:focus { border-color: var(--purple); color: var(--purple); }
  .pct-input.accent:focus { border-color: var(--accent); color: var(--accent); }

  .calc-cell {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .result-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    min-width: 90px;
    text-align: right;
    padding: 5px 4px;
  }

  .result-display.blue { color: var(--blue); }
  .result-display.purple { color: var(--purple); }
  .result-display.accent { color: var(--accent); }
  .result-display.empty { color: var(--text-muted); font-weight: 400; }

  .pct-symbol {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .row-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  tbody tr:hover .row-actions { opacity: 1; }

  .btn-icon {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    background: transparent;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
    font-size: 14px;
  }

  .btn-icon.save:hover {
    border-color: var(--green);
    color: var(--green);
    background: rgba(61,220,132,0.1);
  }

  .btn-icon.delete:hover {
    border-color: var(--red);
    color: var(--red);
    background: var(--red-dim);
  }

  .btn-icon.saving {
    color: var(--accent);
    animation: pulse 0.8s infinite;
  }

  #empty-state {
    padding: 60px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    display: none;
  }

  #empty-state p { margin-top: 8px; font-size: 12px; color: #444; }

  footer {
    margin-top: 20px;
    font-size: 11px;
    color: #333;
    font-family: 'JetBrains Mono', monospace;
    text-align: right;
  }
</style>
</head>
<body>

<header>
  <h1>Lista de Precios</h1>
  <span class="subtitle">NEXO · Rosario</span>
</header>

<div id="status-bar">
  <div id="status-dot" class="loading"></div>
  <span id="status-text">Conectando...</span>
</div>

<div class="toolbar">
  <button class="btn primary" onclick="addRow()">+ Nueva fila</button>
  <button class="btn" onclick="loadData()">↺ Recargar</button>
</div>

<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th style="width:65px">Cant.</th>
        <th>Producto</th>
        <th style="width:100px">P. Costo</th>
        <th class="blue-header" style="width:60px">%</th>
        <th class="blue-header" style="width:110px">Revendedor</th>
        <th class="purple-header" style="width:60px">%</th>
        <th class="purple-header" style="width:110px">Local Físico</th>
        <th class="accent-header" style="width:60px">%</th>
        <th class="accent-header" style="width:110px">Precio Socio</th>
        <th style="width:70px"></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty-state">
    Sin productos aún
    <p>Hacé clic en "+ Nueva fila" para empezar</p>
  </div>
</div>

<footer>Guardado en Supabase</footer>

<script>
const SUPABASE_URL = 'https://dlebxtyhjesaalrtusmy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsZWJ4dHloamVzYWFscnR1c215Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDY5NjgsImV4cCI6MjA5NzM4Mjk2OH0.8HYsAWxgAwu8U7La6KLX4j14e-Syo_Q4uKZVUQN51bw';
const TABLE = 'lista_precios';

const headers = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Prefer': 'return=representation'
};

function setStatus(type, msg) {
  document.getElementById('status-dot').className = type;
  document.getElementById('status-text').textContent = msg;
}

async function api(method, path, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  if (res.status === 204) return null;
  return res.json();
}

async function loadData() {
  setStatus('loading', 'Cargando...');
  try {
    const rows = await api('GET', `${TABLE}?order=id.asc`);
    renderTable(rows);
    setStatus('ok', `${rows.length} producto${rows.length !== 1 ? 's' : ''}`);
  } catch(e) {
    setStatus('error', 'Error: ' + e.message);
  }
}

function calcPrecio(costo, pct) {
  if (!costo || !pct) return null;
  return Math.round(costo + (costo * pct / 100));
}

function formatPeso(n) {
  if (n === null || n === undefined || n === '') return '';
  return '$' + Number(n).toLocaleString('es-AR');
}

function makeCalcGroup(tr, costoInput, pctField, resultField, colorClass) {
  const pctInput = tr.querySelector(`[data-field="${pctField}"]`);
  const display = tr.querySelector(`[data-result="${resultField}"]`);

  function update() {
    const costo = parseInt(costoInput.value) || null;
    const pct = parseInt(pctInput.value) || null;
    const result = calcPrecio(costo, pct);
    if (result !== null) {
      display.textContent = formatPeso(result);
      display.classList.remove('empty');
      display.classList.add(colorClass);
    } else {
      display.textContent = '—';
      display.classList.add('empty');
      display.classList.remove(colorClass);
    }
  }

  costoInput.addEventListener('input', update);
  pctInput.addEventListener('input', update);
  update();
}

function buildRow(row) {
  const tr = document.createElement('tr');
  tr.dataset.id = row.id;

  const plRev = calcPrecio(row.precio_costo, row.porcentaje_revendedor);
  const plLoc = calcPrecio(row.precio_costo, row.porcentaje_local);
  const plLib = calcPrecio(row.precio_costo, row.porcentaje_libre);

  tr.innerHTML = `
    <td><input class="cell-input num-input" data-field="cantidad" value="${row.cantidad ?? ''}" placeholder="—"></td>
    <td><input class="cell-input producto-input" data-field="producto" value="${row.producto ?? ''}" placeholder="Nombre del producto"></td>
    <td><input class="cell-input num-input" data-field="precio_costo" value="${row.precio_costo ?? ''}" placeholder="0"></td>

    <td class="blue-group">
      <input class="pct-input blue" data-field="porcentaje_revendedor" value="${row.porcentaje_revendedor ?? ''}" placeholder="0">
    </td>
    <td class="blue-group">
      <span class="result-display ${plRev !== null ? 'blue' : 'empty'}" data-result="precio_revendedor">${plRev !== null ? formatPeso(plRev) : '—'}</span>
    </td>

    <td class="purple-group">
      <input class="pct-input purple" data-field="porcentaje_local" value="${row.porcentaje_local ?? ''}" placeholder="0">
    </td>
    <td class="purple-group">
      <span class="result-display ${plLoc !== null ? 'purple' : 'empty'}" data-result="precio_local_fisico">${plLoc !== null ? formatPeso(plLoc) : '—'}</span>
    </td>

    <td class="accent-group">
      <input class="pct-input accent" data-field="porcentaje_libre" value="${row.porcentaje_libre ?? ''}" placeholder="0">
    </td>
    <td class="accent-group">
      <span class="result-display ${plLib !== null ? 'accent' : 'empty'}" data-result="precio_libre">${plLib !== null ? formatPeso(plLib) : '—'}</span>
    </td>

    <td>
      <div class="row-actions">
        <button class="btn-icon save" title="Guardar" onclick="saveRow(${row.id}, this)">✓</button>
        <button class="btn-icon delete" title="Eliminar" onclick="deleteRow(${row.id}, this)">✕</button>
      </div>
    </td>
  `;

  const costoInput = tr.querySelector('[data-field="precio_costo"]');
  makeCalcGroup(tr, costoInput, 'porcentaje_revendedor', 'precio_revendedor', 'blue');
  makeCalcGroup(tr, costoInput, 'porcentaje_local', 'precio_local_fisico', 'purple');
  makeCalcGroup(tr, costoInput, 'porcentaje_libre', 'precio_libre', 'accent');

  tr.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') saveRow(row.id, tr.querySelector('.btn-icon.save'));
    });
  });

  return tr;
}

function renderTable(rows) {
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty-state');
  tbody.innerHTML = '';
  if (!rows || rows.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  rows.forEach(row => tbody.appendChild(buildRow(row)));
}

function getRowData(id) {
  const tr = document.querySelector(`tr[data-id="${id}"]`);
  if (!tr) return null;
  const data = {};
  tr.querySelectorAll('[data-field]').forEach(inp => {
    const key = inp.dataset.field;
    const val = inp.value.trim();
    const numFields = ['cantidad','precio_costo','porcentaje_revendedor','porcentaje_local','porcentaje_libre'];
    data[key] = numFields.includes(key) ? (val === '' ? null : parseInt(val)) : (val === '' ? null : val);
  });
  // calcular precios resultantes
  data.precio_revendedor = calcPrecio(data.precio_costo, data.porcentaje_revendedor);
  data.precio_local_fisico = calcPrecio(data.precio_costo, data.porcentaje_local);
  data.precio_libre = calcPrecio(data.precio_costo, data.porcentaje_libre);
  return data;
}

async function saveRow(id, btn) {
  btn.classList.add('saving');
  btn.textContent = '…';
  const data = getRowData(id);
  try {
    await api('PATCH', `${TABLE}?id=eq.${id}`, data);
    btn.classList.remove('saving');
    btn.textContent = '✓';
    setStatus('ok', 'Guardado');
  } catch(e) {
    btn.classList.remove('saving');
    btn.textContent = '✓';
    setStatus('error', 'Error al guardar: ' + e.message);
  }
}

async function addRow() {
  setStatus('loading', 'Creando fila...');
  try {
    const result = await api('POST', TABLE, {
      cantidad: null, producto: null, precio_costo: null,
      porcentaje_revendedor: null, precio_revendedor: null,
      porcentaje_local: null, precio_local_fisico: null,
      porcentaje_libre: null, precio_libre: null
    });
    const newRow = Array.isArray(result) ? result[0] : result;
    document.getElementById('empty-state').style.display = 'none';
    const tbody = document.getElementById('tbody');
    tbody.appendChild(buildRow(newRow));
    setStatus('ok', 'Fila creada');
    tbody.lastElementChild?.querySelector('.producto-input')?.focus();
  } catch(e) {
    setStatus('error', 'Error: ' + e.message);
  }
}

async function deleteRow(id, btn) {
  if (!confirm('¿Eliminar esta fila?')) return;
  try {
    await api('DELETE', `${TABLE}?id=eq.${id}`);
    document.querySelector(`tr[data-id="${id}"]`)?.remove();
    const tbody = document.getElementById('tbody');
    if (tbody.children.length === 0) document.getElementById('empty-state').style.display = 'block';
    setStatus('ok', 'Eliminado');
  } catch(e) {
    setStatus('error', 'Error: ' + e.message);
  }
}

loadData();
</script>
</body>
</html>
